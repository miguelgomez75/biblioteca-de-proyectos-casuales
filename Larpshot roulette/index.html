<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Buckshot Roulette</title>
<meta name="description" content="Versión web del Buckshot Roulette contra la CPU — porteado desde Java Swing.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:         #0b0b0d;
    --surface:    #151316;
    --surface-2:  #1e1b1f;
    --border:     #33262a;
    --text:       #e8e2e4;
    --text-2:     #9b8f93;
    --text-3:     #514850;
    --accent:     #e23d3d;
    --accent-dim: #2a0e0e;
    --good:       #4ade80;
    --font-ui:    'Inter', system-ui, sans-serif;
    --font-mono:  'IBM Plex Mono', monospace;
    --radius:     10px;
    --radius-lg:  16px;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font-ui);
    min-height: 100dvh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 2rem 1rem 3rem;
  }

  header { text-align: center; margin-bottom: 1.5rem; }
  .logo { font-family: var(--font-mono); font-weight: 600; font-size: 1.5rem; letter-spacing: 0.02em; }
  .logo span { color: var(--accent); }
  .tagline { margin-top: 0.35rem; color: var(--text-2); font-size: 0.85rem; }

  .app { width: 100%; max-width: 780px; display: flex; flex-direction: column; gap: 1rem; }

  .board {
    display: grid;
    grid-template-columns: 1fr 1.1fr 1fr;
    gap: 0.9rem;
    align-items: start;
  }
  @media (max-width: 700px) {
    .board { grid-template-columns: 1fr; }
  }

  .panel {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    padding: 1rem;
  }
  .panel-title {
    font-family: var(--font-mono);
    font-size: 0.7rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--text-2);
    margin-bottom: 0.6rem;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .cuffed-tag {
    background: var(--accent-dim);
    color: var(--accent);
    font-size: 0.65rem;
    padding: 2px 6px;
    border-radius: 6px;
    letter-spacing: 0.03em;
  }

  .lives {
    font-family: var(--font-mono);
    font-size: 1.4rem;
    font-weight: 600;
    margin-bottom: 0.85rem;
    display: flex;
    align-items: center;
    gap: 0.4rem;
  }
  .lives .heart { color: var(--accent); font-size: 1.1rem; }

  .items-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 0.4rem;
  }
  .item-btn {
    aspect-ratio: 1;
    background: var(--bg);
    border: 1.5px solid var(--border);
    border-radius: 8px;
    color: var(--text-2);
    font-family: var(--font-ui);
    font-size: 0.62rem;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 2px;
    cursor: pointer;
    padding: 2px;
    line-height: 1.1;
    text-align: center;
  }
  .item-btn .emoji { font-size: 1.15rem; }
  .item-btn:disabled { opacity: 0.35; cursor: default; }
  .item-btn:not(:disabled):hover { border-color: var(--accent); color: var(--text); }
  .item-btn.stealable { border-color: var(--accent); color: var(--text); }
  .item-btn.empty { visibility: hidden; }

  .center-panel { display: flex; flex-direction: column; align-items: center; gap: 0.9rem; }

  .bullets-left {
    font-family: var(--font-mono);
    font-size: 0.75rem;
    color: var(--text-3);
  }

  .shotgun-btn {
    width: 100%;
    background: var(--accent-dim);
    border: 2px solid var(--accent);
    color: var(--accent);
    border-radius: var(--radius);
    font-family: var(--font-mono);
    font-weight: 600;
    font-size: 1rem;
    padding: 0.9rem;
    cursor: pointer;
    letter-spacing: 0.03em;
  }
  .shotgun-btn:hover { background: #3a1414; }
  .shotgun-btn:disabled { opacity: 0.4; cursor: default; }

  .choice-row { display: flex; gap: 0.6rem; width: 100%; }
  .choice-btn {
    flex: 1;
    background: var(--surface-2);
    border: 1px solid var(--border);
    color: var(--text);
    border-radius: var(--radius);
    padding: 0.7rem 0.5rem;
    font-family: var(--font-ui);
    font-size: 0.85rem;
    cursor: pointer;
  }
  .choice-btn:hover { border-color: var(--accent); }
  .choice-cancel { color: var(--text-2); font-size: 0.75rem; background: none; border: none; cursor: pointer; }
  .choice-cancel:hover { color: var(--text); }

  .log-panel {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    padding: 0.9rem 1rem;
    height: 220px;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
    gap: 0.35rem;
    font-size: 0.85rem;
  }
  .log-entry { color: var(--text-2); line-height: 1.4; }
  .log-entry.fresh { color: var(--text); }
  .log-entry b { color: var(--text); }

  .overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.7);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 50;
  }
  .overlay.hidden { display: none; }
  .overlay-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    padding: 1.75rem;
    max-width: 340px;
    width: 90%;
    text-align: center;
  }
  .overlay-title { font-family: var(--font-mono); font-size: 1.1rem; margin-bottom: 0.5rem; }
  .overlay-msg { color: var(--text-2); font-size: 0.9rem; margin-bottom: 1.2rem; }
  .overlay-row { display: flex; gap: 0.6rem; }
</style>
</head>
<body>

  <header>
    <div class="logo">buckshot<span>::</span>roulette</div>
    <div class="tagline">tú contra la CPU · un tambor, dos vidas, cero piedad</div>
  </header>

  <div class="app">
    <div class="board">
      <div class="panel">
        <div class="panel-title"><span>CPU</span><span class="cuffed-tag hidden" id="cpu-cuffed">esposada</span></div>
        <div class="lives"><span class="heart">♥</span><span id="cpu-lives">-</span></div>
        <div class="items-grid" id="cpu-items"></div>
      </div>

      <div class="panel center-panel">
        <div class="panel-title" style="width:100%; justify-content:center;">Escopeta</div>
        <div class="bullets-left" id="bullets-left">Balas restantes: -</div>
        <button class="shotgun-btn" id="btn-shotgun">Disparar</button>
        <div class="choice-row hidden" id="choice-row">
          <button class="choice-btn" id="choice-self">Dispara a ti mismo</button>
          <button class="choice-btn" id="choice-cpu">Dispara a la CPU</button>
        </div>
        <button class="choice-cancel hidden" id="choice-cancel">cancelar</button>
      </div>

      <div class="panel">
        <div class="panel-title"><span>Tú</span><span class="cuffed-tag hidden" id="j1-cuffed">esposado</span></div>
        <div class="lives"><span class="heart">♥</span><span id="j1-lives">-</span></div>
        <div class="items-grid" id="j1-items"></div>
      </div>
    </div>

    <div class="log-panel" id="log-panel"></div>
  </div>

  <div class="overlay hidden" id="overlay">
    <div class="overlay-card">
      <div class="overlay-title" id="overlay-title"></div>
      <div class="overlay-msg" id="overlay-msg"></div>
      <div class="overlay-row" id="overlay-row"></div>
    </div>
  </div>

<script>
  /* ============================================================
     DATOS DE ITEMS
     ============================================================ */
  const ITEM_NAMES = {
    1: 'Cigarros', 2: 'Cerveza', 3: 'Cuchillo', 4: 'Lupa', 5: 'Inversor',
    6: 'Pastilla', 7: 'Inyector', 8: 'Teléfono', 9: 'Esposas'
  };
  const ITEM_ARTICLE = {
    1: 'un paquete de Cigarros', 2: 'una lata de Cerveza', 3: 'un Cuchillo',
    4: 'una Lupa', 5: 'un Inversor', 6: 'un paquete de Pastillas',
    7: 'un Robador de objetos', 8: 'un Teléfono', 9: 'un par de Esposas'
  };
  const ITEM_DESC = {
    1: 'Recupera 1 vida, conservas el turno',
    2: 'Saca la bala actual de la escopeta',
    3: 'El próximo disparo hará doble daño',
    4: 'Puedes ver la bala actual',
    5: 'Cambia la polaridad de la bala',
    6: 'Puede hacerte daño o curarte 1 vida',
    7: 'Puedes robar un objeto al rival y usarlo',
    8: 'Te dice la polaridad de una bala al azar',
    9: 'Inmoviliza al rival durante un turno'
  };
  const ITEM_EMOJI = { 1:'🚬', 2:'🍺', 3:'🔪', 4:'🔎', 5:'🔄', 6:'💊', 7:'🥷', 8:'📞', 9:'⛓️' };

  /* ============================================================
     ESTADO
     ============================================================ */
  const S = {
    vidasJ1: 0, vidasCPU: 0,
    balasTotal: 0, balasVerdaderas: 0,
    objetosRepartidos: 0,
    cuchilloUsado: false,
    j1Esposado: false, cpuEsposado: false,
    j1Roba: false,
    escopeta: [],       // array de {real:boolean}, [0] = próxima bala
    objetosJ1: [],      // array de tipos (1-9)
    objetosCPU: [],
    gameOver: false,
  };

  function randInt(min, max) { return Math.floor(Math.random() * (max - min + 1)) + min; }
  function shuffle(arr) {
    for (let i = arr.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [arr[i], arr[j]] = [arr[j], arr[i]];
    }
  }
  function crearBalas(total, verdaderas) {
    const arr = [];
    for (let i = 0; i < verdaderas; i++) arr.push({ real: true });
    for (let i = 0; i < (total - verdaderas); i++) arr.push({ real: false });
    shuffle(arr);
    return arr;
  }
  function disparar() { return S.escopeta.length ? S.escopeta.shift() : null; }
  function tocarBalaActual() { return S.escopeta.length ? S.escopeta[0] : null; }
  function verBalaFutura(i) { return S.escopeta[i]; }

  /* ============================================================
     LOG
     ============================================================ */
  const logPanel = document.getElementById('log-panel');
  function log(text) {
    // el último mensaje mostrado pasa a tono "leído", el nuevo se resalta
    logPanel.querySelectorAll('.log-entry.fresh').forEach(e => e.classList.remove('fresh'));
    const div = document.createElement('div');
    div.className = 'log-entry fresh';
    div.textContent = text;
    logPanel.appendChild(div);
    logPanel.scrollTop = logPanel.scrollHeight;
  }
  function clearLog() { logPanel.innerHTML = ''; }

  /* ============================================================
     OBJETOS: dar / usar
     ============================================================ */
  function darObjetos(n) {
    for (let i = 0; i < n; i++) {
      const tJ1 = randInt(1, 9);
      if (S.objetosJ1.length < 8) { S.objetosJ1.push(tJ1); log('Recibiste ' + ITEM_ARTICLE[tJ1]); }
      else log('Recibiste ' + ITEM_ARTICLE[tJ1] + ', pero no tienes espacio para guardarlo, así que se descarta');

      const tCPU = randInt(1, 9);
      if (S.objetosCPU.length < 8) { S.objetosCPU.push(tCPU); log('La CPU recibió ' + ITEM_ARTICLE[tCPU]); }
      else log('La CPU recibió ' + ITEM_ARTICLE[tCPU] + ', pero no tiene espacio para guardarlo, así que se descarta');
    }
  }

  function objectEffectJ1(tipo) {
    switch (tipo) {
      case 1:
        S.vidasJ1++;
        log('Fumaste un piti. Recuperaste una vida');
        break;
      case 2: {
        const eraReal = tocarBalaActual().real;
        disparar();
        log('Sacaste la bala actual de la escopeta: era ' + (eraReal ? 'verdadera' : 'falsa'));
        break;
      }
      case 3:
        log('El próximo disparo hará doble daño');
        S.cuchilloUsado = true;
        break;
      case 4: {
        const real = tocarBalaActual().real;
        log('La bala actual es ' + (real ? 'verdadera' : 'falsa'));
        break;
      }
      case 5:
        if (tocarBalaActual()) tocarBalaActual().real = !tocarBalaActual().real;
        log('Cambiaste la polaridad de la bala');
        break;
      case 6:
        log('Puede hacerte daño o curarte 1 vida...');
        if (randInt(1, 2) === 1) { S.vidasJ1++; log('La pastilla te curó 1 vida'); }
        else { S.vidasJ1--; log('Te desplomaste, pierdes 1 vida'); }
        break;
      case 7:
        log('Robas un objeto de la CPU');
        S.j1Roba = true;
        break;
      case 8: {
        if (S.escopeta.length === 0) break;
        const idx = randInt(0, S.escopeta.length - 1);
        log('Te dirá la polaridad de una bala aleatoria de las que quedan...');
        const real = verBalaFutura(idx).real;
        log('La bala nº ' + (idx + 1) + ' es ' + (real ? 'verdadera' : 'falsa'));
        break;
      }
      case 9:
        if (S.cpuEsposado) log('La CPU ya está esposada, no puedes volverla a esposar');
        else { log('Inmovilizas a la CPU durante un turno'); S.cpuEsposado = true; }
        break;
    }
  }

  function objectEffectCPU(tipo) {
    switch (tipo) {
      case 1:
        S.vidasCPU++;
        log('La CPU se fumó un piti. Recuperó una vida');
        break;
      case 2: {
        const eraReal = tocarBalaActual().real;
        disparar();
        log('La CPU sacó la bala actual de la escopeta: era ' + (eraReal ? 'verdadera' : 'falsa'));
        break;
      }
      case 3:
        log('El próximo disparo de la CPU hará doble daño');
        S.cuchilloUsado = true;
        break;
      case 4:
        // fix: en el Java original esto también invertía la polaridad (bug, faltaba un break)
        log('La CPU usó una lupa, ahora sabe cuál es la bala actual');
        break;
      case 5:
        if (tocarBalaActual()) tocarBalaActual().real = !tocarBalaActual().real;
        log('La CPU cambió la polaridad de la bala. ¿Qué estará tramando?');
        break;
      case 6:
        if (randInt(1, 2) === 1) { S.vidasCPU++; log('La pastilla curó 1 vida a la CPU'); }
        else { S.vidasCPU--; log('La CPU se desplomó, pierde 1 vida'); }
        break;
      case 7:
        log('La CPU te roba un objeto y lo usa');
        if (S.objetosJ1.length > 0) {
          const idx = randInt(0, S.objetosJ1.length - 1);
          const tipoRobado = S.objetosJ1[idx];
          S.objetosJ1.splice(idx, 1);
          objectEffectCPU(tipoRobado);
        } else {
          log('No hay ningún objeto en esa casilla');
        }
        break;
      case 8:
        // fix: en el Java original esto también esposaba a J1 (bug, faltaba un break)
        log('La CPU usó un teléfono, ahora sabe cosas de las balas futuras');
        break;
      case 9:
        if (S.j1Esposado) log('Ya estás esposado, ¡qué más quiere la CPU!');
        else { log('La CPU te esposó'); S.j1Esposado = true; }
        break;
    }
  }

  /* ============================================================
     FIN DE RONDA (victoria / derrota / recarga)
     ============================================================ */
  function checkEndOfRound() {
    if (S.vidasCPU <= 0) { onGameOver(true); return true; }
    if (S.vidasJ1 <= 0) { onGameOver(false); return true; }
    if (S.escopeta.length <= 0) { recargar(); return true; }
    return false;
  }

  function recargar() {
    S.j1Esposado = false;
    S.cpuEsposado = false;
    S.cuchilloUsado = false;
    S.balasTotal = randInt(1, 8);
    S.balasVerdaderas = Math.floor(Math.random() * (S.balasTotal - 1)) + 1;
    log('¡Se acabaron las balas! Se introducen ' + S.balasTotal + ' balas, de las cuales ' + S.balasVerdaderas + ' son verdaderas.');
    S.escopeta = crearBalas(S.balasTotal, S.balasVerdaderas);
    darObjetos(S.objetosRepartidos);
    render();
  }

  function onGameOver(gano) {
    S.gameOver = true;
    log(gano ? '¡Ganaste! La CPU se quedó sin vidas' : '¡Perdiste! Te quedaste sin vidas');
    render();
    showOverlay(
      gano ? '¡Victoria!' : 'Derrota',
      gano ? 'La CPU se quedó sin vidas.' : 'Te quedaste sin vidas.',
      [
        { label: 'Jugar otra vez', action: nuevoJuego },
        { label: 'Salir', action: () => { log('Gracias por jugar'); hideOverlay(); } },
      ]
    );
  }

  /* ============================================================
     TURNO DE LA CPU
     ============================================================ */
  function cpuTurnStep() {
    const eleccion = randInt(1, 3);

    if (eleccion === 1) { // dispara a sí misma
      const bala = disparar();
      if (bala.real) {
        if (S.cuchilloUsado) {
          S.vidasCPU -= 2;
          log('¡La CPU se disparó! ¡Doble daño! ¡Sóbate!');
          S.cuchilloUsado = false;
          log('Se repara la escopeta');
        } else {
          S.vidasCPU--;
          log('¡La CPU se disparó!');
        }
        return false;
      } else {
        if (S.cuchilloUsado) {
          log('¡La CPU se salvó! ¿Por qué no diste doble daño? ¡Qué mal uso del cuchillo!');
          S.cuchilloUsado = false;
          log('Se repara la escopeta');
        } else {
          log('¡La CPU se salvó! Tira otra vez...');
        }
        return S.escopeta.length > 0;
      }
    }

    if (eleccion === 2) { // dispara al jugador
      const bala = disparar();
      if (bala.real) {
        if (S.cuchilloUsado) {
          S.vidasJ1 -= 2;
          log('¡La CPU te disparó! ¡Doble daño! Eso va a doler...');
          S.cuchilloUsado = false;
          log('Se repara la escopeta');
        } else {
          S.vidasJ1--;
          log('¡La CPU te disparó!');
        }
      } else {
        if (S.cuchilloUsado) {
          log('Clic... ¡La CPU falló el doble daño!');
          S.cuchilloUsado = false;
          log('Se repara la escopeta');
        } else {
          log('Clic... ¡La CPU falló!');
        }
      }
      return false; // disparar al rival siempre acaba el turno
    }

    // eleccion === 3: usar un objeto
    if (S.objetosCPU.length > 0) {
      const idx = randInt(0, S.objetosCPU.length - 1);
      const tipo = S.objetosCPU[idx];
      S.objetosCPU.splice(idx, 1);
      objectEffectCPU(tipo);
    }
    return S.escopeta.length > 0 && S.vidasJ1 > 0 && S.vidasCPU > 0;
  }

  function turnoCPU() {
    if (S.gameOver) return;
    let seguir = true;
    while (seguir) {
      seguir = cpuTurnStep();
      render();
      if (checkEndOfRound()) { seguir = false; }
      if (S.gameOver) return;
    }
    if (S.j1Esposado) {
      log('Estás esposado, no puedes hacer nada');
      S.j1Esposado = false;
      render();
      turnoCPU();
      return;
    }
    render();
  }

  function afterJ1TurnEndingAction() {
    render();
    if (checkEndOfRound()) return;
    if (S.cpuEsposado) {
      log('La CPU está esposada, no puede hacer nada');
      S.cpuEsposado = false;
      render();
    } else {
      turnoCPU();
    }
  }

  /* ============================================================
     ACCIONES DEL JUGADOR
     ============================================================ */
  function j1Shoot(target) {
    if (S.gameOver) return;
    hideChoice();
    const bala = disparar();
    if (!bala) { log('¡La escopeta no tiene balas!'); render(); return; }

    if (target === 'self') {
      if (bala.real) {
        if (S.cuchilloUsado) {
          S.vidasJ1 -= 2;
          log('¡Boom! Te hiciste doble daño. Eso va a doler...');
          S.cuchilloUsado = false;
          log('Se repara la escopeta');
        } else {
          S.vidasJ1--;
          log('¡Boom! Cagaste... Perdiste una vida');
        }
        afterJ1TurnEndingAction();
      } else {
        if (S.cuchilloUsado) {
          log('Click... ¡Disparo en falso! Qué bien usaste el cuchillo, ¿no?');
          S.cuchilloUsado = false;
          log('Se repara la escopeta');
        } else {
          log('Click... ¡Disparo en falso!');
        }
        render();
        checkEndOfRound(); // por si esa fue la última bala; no pasa el turno
      }
    } else {
      if (bala.real) {
        if (S.cuchilloUsado) {
          S.vidasCPU -= 2;
          log('¡Boom! ¡Le diste a la CPU! ¡Doble daño! Sóbate');
          S.cuchilloUsado = false;
          log('Se repara la escopeta');
        } else {
          S.vidasCPU--;
          log('¡Boom! ¡Le diste a la CPU!');
        }
      } else {
        if (S.cuchilloUsado) {
          log('Click... ¡Disparo en falso! A la próxima no se salva, ¿no?');
          S.cuchilloUsado = false;
          log('Se repara la escopeta');
        } else {
          log('Click... Cagaste...');
        }
      }
      afterJ1TurnEndingAction(); // disparar a la CPU siempre acaba el turno (acierte o falle)
    }
  }

  function useObjetoJ1(idx) {
    if (S.gameOver || idx >= S.objetosJ1.length) return;
    const tipo = S.objetosJ1[idx];
    S.objetosJ1.splice(idx, 1);
    objectEffectJ1(tipo);
    render();
    checkEndOfRound(); // usar un objeto no pasa el turno
  }

  function stealFromCpu(idx) {
    if (S.gameOver || !S.j1Roba || idx >= S.objetosCPU.length) return;
    const tipo = S.objetosCPU[idx];
    S.objetosCPU.splice(idx, 1);
    objectEffectJ1(tipo);
    S.j1Roba = false;
    render();
    checkEndOfRound();
  }

  /* ============================================================
     NUEVA PARTIDA
     ============================================================ */
  function nuevoJuego() {
    hideOverlay();
    const vidas = randInt(2, 6);
    S.vidasJ1 = vidas;
    S.vidasCPU = vidas;
    S.balasTotal = randInt(1, 8);
    S.balasVerdaderas = Math.floor(Math.random() * (S.balasTotal - 1)) + 1;
    S.objetosRepartidos = randInt(2, 4);
    S.cuchilloUsado = false;
    S.j1Esposado = false;
    S.cpuEsposado = false;
    S.j1Roba = false;
    S.objetosJ1 = [];
    S.objetosCPU = [];
    S.gameOver = false;
    S.escopeta = crearBalas(S.balasTotal, S.balasVerdaderas);

    clearLog();
    darObjetos(S.objetosRepartidos);
    log('Se introducen ' + S.balasTotal + ' balas, de las cuales ' + S.balasVerdaderas + ' son verdaderas.');
    render();
  }

  /* ============================================================
     UI: render
     ============================================================ */
  const el = {
    cpuLives: document.getElementById('cpu-lives'),
    j1Lives: document.getElementById('j1-lives'),
    cpuCuffed: document.getElementById('cpu-cuffed'),
    j1Cuffed: document.getElementById('j1-cuffed'),
    cpuItems: document.getElementById('cpu-items'),
    j1Items: document.getElementById('j1-items'),
    bulletsLeft: document.getElementById('bullets-left'),
    btnShotgun: document.getElementById('btn-shotgun'),
    choiceRow: document.getElementById('choice-row'),
    choiceCancel: document.getElementById('choice-cancel'),
  };

  function renderItemGrid(container, items, opts) {
    container.innerHTML = '';
    for (let i = 0; i < 8; i++) {
      const btn = document.createElement('button');
      btn.className = 'item-btn';
      if (i < items.length) {
        const tipo = items[i];
        btn.innerHTML = '<span class="emoji">' + ITEM_EMOJI[tipo] + '</span><span>' + ITEM_NAMES[tipo] + '</span>';
        btn.title = ITEM_DESC[tipo];
        btn.disabled = !opts.enabledFor(i);
        if (opts.stealableHighlight && opts.enabledFor(i)) btn.classList.add('stealable');
        btn.addEventListener('click', () => opts.onClick(i));
      } else {
        btn.classList.add('empty');
        btn.disabled = true;
      }
      container.appendChild(btn);
    }
  }

  function render() {
    el.j1Lives.textContent = S.vidasJ1;
    el.cpuLives.textContent = S.vidasCPU;
    el.j1Cuffed.classList.toggle('hidden', !S.j1Esposado);
    el.cpuCuffed.classList.toggle('hidden', !S.cpuEsposado);
    el.bulletsLeft.textContent = 'Balas restantes: ' + S.escopeta.length;
    el.btnShotgun.disabled = S.gameOver;

    renderItemGrid(el.j1Items, S.objetosJ1, {
      enabledFor: () => !S.gameOver,
      onClick: (i) => useObjetoJ1(i),
    });

    renderItemGrid(el.cpuItems, S.objetosCPU, {
      enabledFor: () => !S.gameOver && S.j1Roba,
      stealableHighlight: true,
      onClick: (i) => stealFromCpu(i),
    });
  }

  /* ── elección de disparo ── */
  function showChoice() {
    el.choiceRow.classList.remove('hidden');
    el.choiceCancel.classList.remove('hidden');
    el.btnShotgun.classList.add('hidden');
  }
  function hideChoice() {
    el.choiceRow.classList.add('hidden');
    el.choiceCancel.classList.add('hidden');
    el.btnShotgun.classList.remove('hidden');
  }

  el.btnShotgun.addEventListener('click', () => { if (!S.gameOver) showChoice(); });
  document.getElementById('choice-self').addEventListener('click', () => j1Shoot('self'));
  document.getElementById('choice-cpu').addEventListener('click', () => j1Shoot('cpu'));
  el.choiceCancel.addEventListener('click', hideChoice);

  /* ── overlay genérico (fin de partida) ── */
  const overlay = document.getElementById('overlay');
  const overlayTitle = document.getElementById('overlay-title');
  const overlayMsg = document.getElementById('overlay-msg');
  const overlayRow = document.getElementById('overlay-row');

  function showOverlay(title, msg, buttons) {
    overlayTitle.textContent = title;
    overlayMsg.textContent = msg;
    overlayRow.innerHTML = '';
    buttons.forEach(b => {
      const btn = document.createElement('button');
      btn.className = 'choice-btn';
      btn.textContent = b.label;
      btn.addEventListener('click', b.action);
      overlayRow.appendChild(btn);
    });
    overlay.classList.remove('hidden');
  }
  function hideOverlay() { overlay.classList.add('hidden'); }

  /* ── arranque ── */
  nuevoJuego();
</script>
</body>
</html>
