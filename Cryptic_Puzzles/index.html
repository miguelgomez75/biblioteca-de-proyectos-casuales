<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cryptic</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=Lora:ital,wght@0,500;1,400&family=Inter:wght@400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:           #0c0c10;
      --surface:      #13131a;
      --surface-2:    #1c1c26;
      --border:       #25253a;
      --text:         #e2e2f0;
      --text-2:       #8080a0;
      --text-3:       #454560;
      --accent:       #e8a030;
      --accent-dim:   #271d08;
      --font-ui:      'Inter', system-ui, sans-serif;
      --font-mono:    'IBM Plex Mono', monospace;
      --font-clue:    'Lora', Georgia, serif;
      --radius:       10px;
      --radius-lg:    16px;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-ui);
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 2rem 1rem 4rem;
    }

    header { text-align: center; margin-bottom: 2.5rem; }
    .logo {
      font-family: var(--font-mono);
      font-size: 2rem;
      font-weight: 600;
      letter-spacing: -0.04em;
    }
    .logo span { color: var(--accent); }
    .tagline {
      font-size: 13px;
      color: var(--text-3);
      margin-top: 4px;
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }

    .card {
      width: 100%;
      max-width: 480px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 1.75rem 1.5rem;
    }

    /* clue box */
    .clue-box {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1.25rem 1rem;
      margin-bottom: 1.5rem;
    }
    .clue-text {
      font-family: var(--font-clue);
      font-size: 1.1rem;
      line-height: 3;
      color: var(--text);
      font-style: italic;
    }

    /* letter boxes */
    .letter-boxes {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-bottom: 1.5rem;
      justify-content: center;
    }
    .letter-box {
      width: 36px;
      height: 36px;
      border: 1px solid var(--border);
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: var(--font-mono);
      font-size: 15px;
      font-weight: 600;
      color: var(--text-3);
      background: var(--bg);
      transition: all 0.25s;
    }
    .letter-box.revealed {
      border-color: var(--accent);
      color: var(--accent);
      background: var(--accent-dim);
    }
    .letter-box.correct {
      border-color: #34d399;
      color: #34d399;
      background: #0b2218;
    }
    .letter-gap {
      width: 14px;
      flex-shrink: 0;
    }

    /* input */
    .input-row {
      display: flex;
      gap: 8px;
      margin-bottom: 6px;
    }
    input[type=text] {
      flex: 1;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text);
      font-family: var(--font-mono);
      font-size: 1rem;
      text-align: center;
      text-transform: uppercase;
      padding: 10px 14px;
      outline: none;
      transition: border-color 0.2s;
    }
    input[type=text]:focus  { border-color: var(--accent); }
    input[type=text]::placeholder { color: var(--text-3); font-size: 0.85rem; text-transform: none; }

    /* buttons */
    button {
      font-family: var(--font-ui);
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      border: none;
      border-radius: var(--radius);
      padding: 10px 18px;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      transition: opacity 0.15s, transform 0.1s;
    }
    button:active:not(:disabled) { transform: scale(0.97); }
    button:disabled { opacity: 0.3; cursor: default; }

    .btn-check {
      background: var(--accent);
      color: #000;
      flex-shrink: 0;
    }
    .btn-check:hover:not(:disabled) { opacity: 0.88; }

    .btn-next {
      background: var(--accent);
      color: #000;
      width: 100%;
      justify-content: center;
      margin-top: 0;
    }
    .btn-next:hover { opacity: 0.88; }

    /* hint buttons */
    .hints {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-top: 1.25rem;
    }
    .btn-hint {
      background: var(--surface-2);
      color: var(--text-2);
      border: 1px solid var(--border);
      font-size: 13px;
      padding: 8px 12px;
      justify-content: flex-start;
    }
    .btn-hint:hover:not(:disabled) { border-color: #40405a; color: var(--text); }
    .btn-hint.used { opacity: 0.25; }

    .hint-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    /* feedback */
    .feedback {
      font-size: 12px;
      text-align: center;
      min-height: 18px;
      font-family: var(--font-mono);
      margin-top: 6px;
      color: #f87171;
      transition: color 0.3s;
    }

    /* divider */
    .divider { height: 1px; background: var(--border); margin: 1.25rem 0; }

    /* explanation */
    .explanation-box {
      background: #0b2218;
      border: 1px solid #1a4a35;
      border-radius: var(--radius);
      padding: 1rem;
      margin-bottom: 1.25rem;
    }
    .explanation-label {
      font-size: 11px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: #34d399;
      margin-bottom: 6px;
      font-family: var(--font-mono);
    }
    .explanation-text {
      font-size: 14px;
      color: #a0d4b8;
      line-height: 1.6;
      font-family: var(--font-clue);
    }

    .loading {
      text-align: center;
      padding: 2rem;
      color: var(--text-3);
      font-family: var(--font-mono);
    }


    /* ── nav panel ── */
    .nav-toggle {
      position: fixed;
      top: 1rem;
      left: 1rem;
      z-index: 300;
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text-2);
      width: 36px;
      height: 36px;
      border-radius: var(--radius);
      font-size: 16px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0;
      transition: color 0.15s, border-color 0.15s;
    }
    .nav-toggle:hover { color: var(--text); border-color: #40405a; }

    .nav-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.55);
      z-index: 310;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.2s;
    }
    .nav-overlay.open { opacity: 1; pointer-events: auto; }

    .nav-panel {
      position: fixed;
      top: 0;
      left: -300px;
      width: 280px;
      height: 100dvh;
      background: var(--surface);
      border-right: 1px solid var(--border);
      z-index: 320;
      display: flex;
      flex-direction: column;
      transition: left 0.22s ease;
    }
    .nav-panel.open { left: 0; }

    .nav-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 1rem 1rem 0.75rem;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    .nav-title {
      font-family: var(--font-mono);
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--text-2);
    }
    .nav-close {
      background: none;
      border: none;
      color: var(--text-3);
      font-size: 16px;
      cursor: pointer;
      padding: 4px;
      width: auto;
      height: auto;
      border-radius: 4px;
    }
    .nav-close:hover { color: var(--text); }

    .nav-content {
      overflow-y: auto;
      flex: 1;
      padding: 0.5rem 0;
    }

    .nav-search {
      padding: 0.75rem 1rem;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    .nav-search input[type=text] {
      width: 100%;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text);
      font-family: var(--font-ui);
      font-size: 13px;
      text-align: left;
      text-transform: none;
      padding: 8px 10px;
    }
    .nav-search input[type=text]:focus { border-color: var(--accent); }
    .nav-search input[type=text]::placeholder { text-transform: none; }

    /* top-level group (e.g. "Introduction") */
    .nav-group-label {
      display: flex;
      align-items: center;
      justify-content: space-between;
      width: 100%;
      background: none;
      border: none;
      border-radius: 0;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--text-2);
      padding: 0.85rem 1rem 0.35rem;
      font-family: var(--font-mono);
      cursor: pointer;
      transition: color 0.15s;
    }
    .nav-group-label:hover { color: var(--text); }
    .nav-group-list.collapsed { display: none; }

    /* subcategory, indented further when nested inside a group */
    .nav-cat-label {
      display: flex;
      align-items: center;
      justify-content: space-between;
      width: 100%;
      background: none;
      border: none;
      border-radius: 0;
      font-size: 10px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--text-3);
      padding: 0.75rem 1rem 0.25rem;
      font-family: var(--font-mono);
      cursor: pointer;
      transition: color 0.15s;
    }
    .nav-cat-label:hover { color: var(--text-2); }
    .nav-cat-arrow {
      font-size: 9px;
      color: var(--text-3);
      transition: color 0.15s;
    }
    .nav-cat-label:hover .nav-cat-arrow,
    .nav-group-label:hover .nav-cat-arrow { color: var(--text); }
    .nav-cat-list.collapsed { display: none; }

    .nav-group-list .nav-cat-label { padding-left: 1.5rem; }
    .nav-group-list .nav-puzzle-btn { padding-left: 2rem; }

    .search-hidden { display: none !important; }

    .nav-puzzle-btn {
      display: block;
      width: 100%;
      text-align: left;
      background: none;
      border: none;
      color: var(--text-2);
      font-family: var(--font-ui);
      font-size: 13px;
      padding: 6px 1rem;
      cursor: pointer;
      border-radius: 0;
      transition: background 0.1s, color 0.1s;
    }
    .nav-puzzle-btn:hover { background: var(--surface-2); color: var(--text); }
    .nav-puzzle-btn.active {
      color: var(--accent);
      background: var(--accent-dim);
    }
    .hidden { display: none !important; }
  </style>
</head>
<body>

  <header>
    <div class="logo">cryp<span>tic</span></div>
    <div class="tagline">solve the clue</div>
  </header>

  <button class="nav-toggle" id="nav-toggle" aria-label="Open puzzle list">☰</button>

  <div class="nav-overlay" id="nav-overlay"></div>
  <div class="nav-panel" id="nav-panel">
    <div class="nav-header">
      <span class="nav-title">Puzzles</span>
      <button class="nav-close" id="nav-close" aria-label="Close">✕</button>
    </div>
    <div class="nav-search">
      <input type="text" id="nav-search-input" placeholder="Buscar puzzle…" autocomplete="off" autocorrect="off" spellcheck="false" />
    </div>
    <div class="nav-content" id="nav-content"></div>
  </div>

    <div class="card">
    <div id="loading" class="loading">loading puzzles…</div>

    <div id="game" class="hidden">

      <div class="clue-box">
        <div class="clue-text" id="clue-text"></div>
      </div>

      <div class="letter-boxes" id="letter-boxes"></div>

      <div id="input-area">
        <div class="input-row">
          <input type="text" id="answer-input" placeholder="your answer" autocomplete="off" autocorrect="off" spellcheck="false" />
          <button class="btn-check" id="check-btn">Check</button>
        </div>
        <div class="feedback" id="feedback"></div>
      </div>

      <div class="hints">
        <button class="btn-hint" id="hint-fodder">
          <span class="hint-dot" style="background:#fbbf24"></span>
          Fodder
        </button>
        <button class="btn-hint" id="hint-indicator">
          <span class="hint-dot" style="background:#c084fc"></span>
          Indicator
        </button>
        <button class="btn-hint" id="hint-definition">
          <span class="hint-dot" style="background:#60a5fa"></span>
          Definition
        </button>
        <button class="btn-hint" id="hint-letter">
          <span>◆</span>
          <span id="hint-letter-label">Letter</span>
        </button>
      </div>

      <div id="win-area" class="hidden">
        <div class="divider"></div>
        <div class="explanation-box">
          <div class="explanation-label">✓ solved</div>
          <div class="explanation-text" id="explanation-text"></div>
        </div>
        <button class="btn-next" id="next-btn">Next puzzle →</button>
      </div>

    </div>
  </div>

  <script>
  (function () {

    /* ── fallback puzzles ── */
    var FALLBACK = [
      {
        clue: "Be quiet — anagram of listen (6)",
        answer: "SILENT",
        fodder: ["listen"],
        indicator: ["anagram of"],
        definition: ["Be quiet"],
        explanation: "Anagram indicator: 'anagram of'. Rearrange LISTEN to get SILENT, meaning 'be quiet'."
      },
      {
        clue: "Feline hidden within vacate (3)",
        answer: "CAT",
        fodder: ["vacate"],
        indicator: ["hidden within"],
        definition: ["Feline"],
        explanation: "Hidden word: the letters CAT are concealed inside vaCAte."
      },
      {
        clue: "Rely on, or side of a river (4)",
        answer: "BANK",
        fodder: [],
        indicator: [],
        definition: ["Rely on", "side of a river"],
        explanation: "Double definition: 'rely on' and 'side of a river' both clue BANK independently."
      },
      {
        clue: "Fish that sounds like a soul (4)",
        answer: "SOLE",
        fodder: ["soul"],
        indicator: ["sounds like"],
        definition: ["Fish"],
        explanation: "Homophone: SOUL spoken aloud sounds like SOLE, a flatfish."
      }
    ];

    /* true if arr has at least one non-empty string */
    function hasContent(arr) {
      if (!Array.isArray(arr)) return false;
      return arr.some(function (s) { return typeof s === 'string' && s.trim().length > 0; });
    }

    /* underline layers: definition at bottom, indicator on top */
    var LAYERS = [
      { type: 'definition', color: '#60a5fa', offset: 0  },
      { type: 'fodder',     color: '#fbbf24', offset: 5  },
      { type: 'indicator',  color: '#c084fc', offset: 10 }
    ];

    /* ── state ── */
    var puzzles = [];
    var puzzle  = null;
    var usedHints       = new Set();
    var revealedLetters = new Set();
    var solved = false;

    /* ── DOM refs ── */
    var loadingEl      = document.getElementById('loading');
    var gameEl         = document.getElementById('game');
    var clueTextEl     = document.getElementById('clue-text');
    var letterBoxesEl  = document.getElementById('letter-boxes');
    var answerInput    = document.getElementById('answer-input');
    var checkBtn       = document.getElementById('check-btn');
    var feedbackEl     = document.getElementById('feedback');
    var hintFodder     = document.getElementById('hint-fodder');
    var hintIndicator  = document.getElementById('hint-indicator');
    var hintDefinition = document.getElementById('hint-definition');
    var hintLetter     = document.getElementById('hint-letter');
    var hintLetterLbl  = document.getElementById('hint-letter-label');
    var winArea        = document.getElementById('win-area');
    var explanationEl  = document.getElementById('explanation-text');
    var nextBtn        = document.getElementById('next-btn');

    /* ── load puzzles ── */
    function init(data) {
      var valid = Array.isArray(data)
        ? data.filter(function (p) { return p.clue && p.answer; })
        : [];
      puzzles = valid.length ? valid : FALLBACK;
      loadingEl.classList.add('hidden');
      gameEl.classList.remove('hidden');
      buildNav();
      loadPuzzleAt(Math.floor(Math.random() * puzzles.length));
    }

    try {
      fetch('./puzzles.json')
        .then(function (r) { return r.text(); })
        .then(function (t) {
          /* strip trailing commas so hand-edited JSON doesn\'t break */
          var clean = t.replace(/,\s*([\]\}])/g, '$1');
          init(JSON.parse(clean));
        })
        .catch(function () { init(FALLBACK); });
    } catch (e) {
      init(FALLBACK);
    }

    /* ── puzzle lifecycle ── */
    function loadPuzzle() {
      puzzle          = puzzles[Math.floor(Math.random() * puzzles.length)];
      usedHints       = new Set();
      revealedLetters = new Set();
      solved          = false;

      answerInput.value         = '';
      answerInput.disabled      = false;
      answerInput.style.borderColor = '';
      checkBtn.disabled         = false;
      feedbackEl.textContent    = '';
      winArea.classList.add('hidden');

      [hintFodder, hintIndicator, hintDefinition, hintLetter].forEach(function (b) {
        b.classList.remove('used');
        b.disabled = false;
      });

      if (!hasContent(puzzle.fodder))    { hintFodder.disabled    = true; hintFodder.classList.add('used'); }
      if (!hasContent(puzzle.indicator)) { hintIndicator.disabled = true; hintIndicator.classList.add('used'); }

      updateLetterLabel();
      renderClue();
      renderBoxes();
      answerInput.focus();
    }

    /* ── underline style builder ── */
    function buildStyle(activeTypes) {
      var active = LAYERS.filter(function (l) { return activeTypes.has(l.type); });
      if (!active.length) return '';

      var imgs = active.map(function (l) {
        return 'linear-gradient(' + l.color + ',' + l.color + ')';
      });
      var szs  = active.map(function () { return '100% 2px'; });
      var pos  = active.map(function (l) {
        return '0 calc(100% - ' + l.offset + 'px)';
      });

      return 'background-image:' + imgs.join(',') + ';' +
             'background-size:'  + szs.join(',')  + ';' +
             'background-position:' + pos.join(',') + ';' +
             'background-repeat:no-repeat';
    }

    /* ── clue renderer ── */
    function renderClue() {
      var clue  = puzzle.clue;
      var lower = clue.toLowerCase();
      var n     = clue.length;
      var chars = [];
      for (var i = 0; i < n; i++) chars.push(new Set());

      var fields = [
        { texts: puzzle.fodder,     type: 'fodder'     },
        { texts: puzzle.indicator,  type: 'indicator'  },
        { texts: puzzle.definition, type: 'definition' }
      ];

      fields.forEach(function (f) {
        if (!usedHints.has(f.type)) return;
        var texts = Array.isArray(f.texts) ? f.texts : (f.texts ? [f.texts] : []);
        texts.forEach(function (text) {
          if (!text || !text.trim()) return;
          /* try exact match, then whitespace-flexible match */
          var idx      = lower.indexOf(text.toLowerCase());
          var matchLen = text.length;
          if (idx === -1) {
            var escaped = text.toLowerCase()
              .replace(/[.+?^${}()|[\]\\]/g, '\\$&')
              .replace(/\s+/g, '\\s+');
            var m = new RegExp(escaped, 'i').exec(clue);
            if (!m) return;
            idx      = m.index;
            matchLen = m[0].length;
          }
          for (var i = idx; i < idx + matchLen; i++) chars[i].add(f.type);
        });
      });

      /* group consecutive chars with same highlight set */
      var html = '';
      var i = 0;
      while (i < n) {
        var key = Array.from(chars[i]).sort().join(',');
        var j   = i + 1;
        while (j < n && Array.from(chars[j]).sort().join(',') === key) j++;

        var chunk = clue.slice(i, j)
          .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
        var style = buildStyle(chars[i]);
        html += style
          ? '<span style="' + style + '">' + chunk + '</span>'
          : '<span>' + chunk + '</span>';
        i = j;
      }
      clueTextEl.innerHTML = html;
    }

    /* ── letter boxes ── */
    function renderBoxes() {
      var ans = puzzle.answer.toUpperCase();
      letterBoxesEl.innerHTML = '';
      for (var i = 0; i < ans.length; i++) {
        if (ans[i] === ' ') {
          var gap = document.createElement('div');
          gap.className = 'letter-gap';
          letterBoxesEl.appendChild(gap);
          continue;
        }
        var box = document.createElement('div');
        var rev = revealedLetters.has(i);
        box.className   = 'letter-box' + (rev ? ' revealed' : '');
        box.textContent = rev ? ans[i] : '_';
        letterBoxesEl.appendChild(box);
      }
    }

    function markBoxesCorrect() {
      var ans   = puzzle.answer.toUpperCase();
      var boxes = letterBoxesEl.querySelectorAll('.letter-box');
      var bi = 0;
      for (var i = 0; i < ans.length; i++) {
        if (ans[i] === ' ') continue;
        var b = boxes[bi++];
        b.className   = 'letter-box correct';
        b.textContent = ans[i];
      }
    }

    function updateLetterLabel() {
      var total    = puzzle ? puzzle.answer.replace(/\s/g, '').length : 0;
      var revealed = revealedLetters.size;
      hintLetterLbl.textContent = 'Letter (' + revealed + '/' + total + ')';
    }

    /* ── hints ── */
    function applyHint(type, btn) {
      if (solved || usedHints.has(type)) return;
      usedHints.add(type);
      btn.classList.add('used');
      btn.disabled = true;
      renderClue();
    }

    hintFodder.addEventListener('click',     function () { applyHint('fodder',     hintFodder);     });
    hintIndicator.addEventListener('click',  function () { applyHint('indicator',  hintIndicator);  });
    hintDefinition.addEventListener('click', function () { applyHint('definition', hintDefinition); });

    hintLetter.addEventListener('click', function () {
      if (solved) return;
      var ans       = puzzle.answer.toUpperCase();
      var available = [];
      for (var i = 0; i < ans.length; i++) {
        if (ans[i] === ' ') continue;
        if (!revealedLetters.has(i)) available.push(i);
      }
      if (!available.length) return;

      var pick = available[Math.floor(Math.random() * available.length)];
      revealedLetters.add(pick);

      var totalLetters = ans.replace(/\s/g, '').length;
      if (revealedLetters.size >= totalLetters) {
        hintLetter.disabled = true;
        hintLetter.classList.add('used');
      }
      updateLetterLabel();
      renderBoxes();
    });

    /* ── check answer ── */
    function checkAnswer() {
      if (solved) return;
      var guess = answerInput.value.trim().toUpperCase().replace(/\s+/g, ' ');
      if (!guess) return;

      if (guess === puzzle.answer.toUpperCase().replace(/\s+/g, ' ')) {
        solved = true;
        answerInput.disabled = true;
        checkBtn.disabled    = true;
        feedbackEl.textContent = '';

        ['fodder', 'indicator', 'definition'].forEach(function (t) { usedHints.add(t); });
        renderClue();
        markBoxesCorrect();

        explanationEl.textContent = puzzle.explanation || '';
        winArea.classList.remove('hidden');

        [hintFodder, hintIndicator, hintDefinition, hintLetter].forEach(function (b) {
          b.disabled = true;
        });
      } else {
        feedbackEl.textContent = '✗ not quite — try again';
        answerInput.style.borderColor = '#f87171';
        setTimeout(function () {
          answerInput.style.borderColor = '';
          feedbackEl.textContent = '';
        }, 1200);
        answerInput.select();
      }
    }


    /* ── nav panel ── */
    var navToggle      = document.getElementById('nav-toggle');
    var navOverlay     = document.getElementById('nav-overlay');
    var navPanel       = document.getElementById('nav-panel');
    var navClose       = document.getElementById('nav-close');
    var navContent     = document.getElementById('nav-content');
    var navSearchInput = document.getElementById('nav-search-input');
    var currentPuzzleIndex = -1;

    var openGroups = new Set(); /* expanded top-level groups, e.g. "Introduction" */
    var openCats   = new Set(); /* expanded subcategories, keyed by catKey() */

    /* unique key for a subcategory: scoped by its parent group so two groups
       can each have a category with the same name without colliding */
    function catKey(group, cat) { return (group || '') + '\u241F' + cat; }

    function escHtml(s) {
      return String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
    }

    function openNav()  { navPanel.classList.add('open'); navOverlay.classList.add('open'); }
    function closeNav() { navPanel.classList.remove('open'); navOverlay.classList.remove('open'); }

    navToggle.addEventListener('click', openNav);
    navClose.addEventListener('click', closeNav);
    navOverlay.addEventListener('click', closeNav);

    /* data captured by buildNav(), reused by updateNavActive()/search */
    var navTopOrder  = [];   /* [{kind:'group', key} | {kind:'cat', key}] in first-appearance order */
    var navGroupData = {};   /* group -> { catOrder:[catKey], cats:{catKey:{name,items}} } */
    var navTopCats   = {};   /* catKey -> {name, items} for ungrouped top-level categories */

    function buildNav() {
      navTopOrder  = [];
      navGroupData = {};
      navTopCats   = {};
      var topSeen = {};

      puzzles.forEach(function (p, i) {
        var group = p.group || null;
        var cat   = p.category || 'Other';

        if (group) {
          if (!topSeen['g:' + group]) { topSeen['g:' + group] = true; navTopOrder.push({ kind: 'group', key: group }); }
          if (!navGroupData[group]) navGroupData[group] = { catOrder: [], cats: {}, seen: {} };
          var gd = navGroupData[group];
          var ck = catKey(group, cat);
          if (!gd.seen[ck]) { gd.seen[ck] = true; gd.catOrder.push(ck); gd.cats[ck] = { name: cat, items: [] }; }
          gd.cats[ck].items.push({ p: p, i: i });
        } else {
          var ck2 = catKey(null, cat);
          if (!topSeen['c:' + ck2]) { topSeen['c:' + ck2] = true; navTopOrder.push({ kind: 'cat', key: ck2 }); }
          if (!navTopCats[ck2]) navTopCats[ck2] = { name: cat, items: [] };
          navTopCats[ck2].items.push({ p: p, i: i });
        }
      });

      function renderPuzzleBtns(items) {
        return items.map(function (item) {
          var name = item.p.name || item.p.answer || ('Puzzle ' + (item.i + 1));
          return '<button class="nav-puzzle-btn" data-idx="' + item.i + '">' + escHtml(name) + '</button>';
        }).join('');
      }

      function renderCat(ck, catObj) {
        var isOpen = openCats.has(ck);
        return '<div class="nav-cat" data-catkey="' + escHtml(ck) + '">'
             +   '<button class="nav-cat-label" data-catkey="' + escHtml(ck) + '">'
             +     '<span>' + escHtml(catObj.name) + '</span>'
             +     '<span class="nav-cat-arrow">' + (isOpen ? '▾' : '▸') + '</span>'
             +   '</button>'
             +   '<div class="nav-cat-list' + (isOpen ? '' : ' collapsed') + '">'
             +     renderPuzzleBtns(catObj.items)
             +   '</div>'
             + '</div>';
      }

      var html = '';
      navTopOrder.forEach(function (entry) {
        if (entry.kind === 'group') {
          var group  = entry.key;
          var gd     = navGroupData[group];
          var isOpen = openGroups.has(group);
          html += '<div class="nav-group" data-group="' + escHtml(group) + '">'
                +   '<button class="nav-group-label">'
                +     '<span>' + escHtml(group) + '</span>'
                +     '<span class="nav-cat-arrow">' + (isOpen ? '▾' : '▸') + '</span>'
                +   '</button>'
                +   '<div class="nav-group-list' + (isOpen ? '' : ' collapsed') + '">'
                +     gd.catOrder.map(function (ck) { return renderCat(ck, gd.cats[ck]); }).join('')
                +   '</div>'
                + '</div>';
        } else {
          html += renderCat(entry.key, navTopCats[entry.key]);
        }
      });
      navContent.innerHTML = html;

      navContent.querySelectorAll('.nav-group-label').forEach(function (btn) {
        btn.addEventListener('click', function () {
          var group = this.closest('.nav-group').getAttribute('data-group');
          var list  = this.nextElementSibling;
          var arrow = this.querySelector('.nav-cat-arrow');
          if (openGroups.has(group)) { openGroups.delete(group); list.classList.add('collapsed'); arrow.textContent = '▸'; }
          else                       { openGroups.add(group);    list.classList.remove('collapsed'); arrow.textContent = '▾'; }
        });
      });

      navContent.querySelectorAll('.nav-cat-label').forEach(function (btn) {
        btn.addEventListener('click', function () {
          var ck    = this.getAttribute('data-catkey');
          var list  = this.nextElementSibling;
          var arrow = this.querySelector('.nav-cat-arrow');
          if (openCats.has(ck)) { openCats.delete(ck); list.classList.add('collapsed'); arrow.textContent = '▸'; }
          else                  { openCats.add(ck);    list.classList.remove('collapsed'); arrow.textContent = '▾'; }
        });
      });

      navContent.querySelectorAll('.nav-puzzle-btn').forEach(function (btn) {
        btn.addEventListener('click', function () {
          var idx = parseInt(this.getAttribute('data-idx'), 10);
          loadPuzzleAt(idx);
          closeNav();
        });
      });

      if (navSearchInput.value.trim()) applySearchFilter();
    }

    function updateNavActive() {
      var p = puzzles[currentPuzzleIndex];
      if (p) {
        var group = p.group || null;
        var cat   = p.category || 'Other';
        if (group) openGroups.add(group);
        openCats.add(catKey(group, cat));
      }

      navContent.querySelectorAll('.nav-group').forEach(function (groupEl) {
        var group = groupEl.getAttribute('data-group');
        var label = groupEl.querySelector('.nav-group-label');
        var list  = groupEl.querySelector('.nav-group-list');
        var arrow = label.querySelector('.nav-cat-arrow');
        var open  = openGroups.has(group);
        list.classList.toggle('collapsed', !open);
        arrow.textContent = open ? '▾' : '▸';
      });

      navContent.querySelectorAll('.nav-cat').forEach(function (catEl) {
        var ck    = catEl.getAttribute('data-catkey');
        var label = catEl.querySelector('.nav-cat-label');
        var list  = catEl.querySelector('.nav-cat-list');
        var arrow = label.querySelector('.nav-cat-arrow');
        var open  = openCats.has(ck);
        list.classList.toggle('collapsed', !open);
        arrow.textContent = open ? '▾' : '▸';
      });

      navContent.querySelectorAll('.nav-puzzle-btn').forEach(function (btn) {
        var idx = parseInt(btn.getAttribute('data-idx'), 10);
        btn.classList.toggle('active', idx === currentPuzzleIndex);
      });

      if (navSearchInput.value.trim()) applySearchFilter();
    }

    /* ── search ── */
    function applySearchFilter() {
      var q = navSearchInput.value.trim().toLowerCase();

      if (!q) {
        navContent.querySelectorAll('.nav-group, .nav-cat, .nav-puzzle-btn').forEach(function (el) {
          el.classList.remove('search-hidden');
        });
        updateNavActive();
        return;
      }

      navContent.querySelectorAll('.nav-puzzle-btn').forEach(function (btn) {
        var idx = parseInt(btn.getAttribute('data-idx'), 10);
        var p   = puzzles[idx];
        var haystack = [p.name, p.answer, p.category, p.group, p.clue]
          .filter(Boolean).join(' ').toLowerCase();
        btn.classList.toggle('search-hidden', haystack.indexOf(q) === -1);
      });

      navContent.querySelectorAll('.nav-cat').forEach(function (catEl) {
        var list = catEl.querySelector('.nav-cat-list');
        var arrow = catEl.querySelector('.nav-cat-label .nav-cat-arrow');
        var hasVisible = !!catEl.querySelector('.nav-puzzle-btn:not(.search-hidden)');
        catEl.classList.toggle('search-hidden', !hasVisible);
        list.classList.toggle('collapsed', !hasVisible);
        if (hasVisible) arrow.textContent = '▾';
      });

      navContent.querySelectorAll('.nav-group').forEach(function (groupEl) {
        var list = groupEl.querySelector('.nav-group-list');
        var arrow = groupEl.querySelector('.nav-group-label .nav-cat-arrow');
        var hasVisible = !!groupEl.querySelector('.nav-cat:not(.search-hidden)');
        groupEl.classList.toggle('search-hidden', !hasVisible);
        list.classList.toggle('collapsed', !hasVisible);
        if (hasVisible) arrow.textContent = '▾';
      });
    }

    navSearchInput.addEventListener('input', applySearchFilter);

    function loadPuzzleAt(idx) {
      currentPuzzleIndex = idx;
      puzzle          = puzzles[idx];
      usedHints       = new Set();
      revealedLetters = new Set();
      solved          = false;

      answerInput.value         = '';
      answerInput.disabled      = false;
      answerInput.style.borderColor = '';
      checkBtn.disabled         = false;
      feedbackEl.textContent    = '';
      winArea.classList.add('hidden');

      [hintFodder, hintIndicator, hintDefinition, hintLetter].forEach(function (b) {
        b.classList.remove('used');
        b.disabled = false;
      });

      if (!hasContent(puzzle.fodder))    { hintFodder.disabled    = true; hintFodder.classList.add('used'); }
      if (!hasContent(puzzle.indicator)) { hintIndicator.disabled = true; hintIndicator.classList.add('used'); }

      updateLetterLabel();
      renderClue();
      renderBoxes();
      updateNavActive();
      answerInput.focus();
    }

    checkBtn.addEventListener('click', checkAnswer);
    answerInput.addEventListener('keydown', function (e) {
      if (e.key === 'Enter') checkAnswer();
    });
    nextBtn.addEventListener('click', function () {
      loadPuzzleAt(Math.floor(Math.random() * puzzles.length));
    });

  })();
  </script>
</body>
</html>
